<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login de Acesso</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Segoe UI", sans-serif;
        }

        body {
            background-color: #368c39b0;
            min-height: 100vh;
            background: linear-gradient(135, #0f3d2e, #4caf50);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-wrapper {
            display: flex;
            max-width: 900px;
            width: 100%;
            background: #f4f9f6;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        }

        .login-image {
            flex: 1;
            background: url("https://images.unsplash.com/photo-1501004318641-b39e6451bec6") center / cover no-repeat;
            position: relative;
        }

        .login-image::after {
            content:"";
            position: absolute;
            inset: 0;
            background: rgba(15, 61, 46, 0.55);
        }

        .image-text {
            position: absolute;
            bottom: 30px;
            left: 30px;
            right: 30px;
            color: #fff;
            z-index: 1;
        }

        .image-text h2{
            font-size: 26px;
            margin-bottom: 8px;
        }

        .image-text p {
            font-size: 14px;
            line-height: 1.4;
        }

        .btn-main img {
          margin-top: 10px;
          margin-left: 10px;
          width: 35px;
          height: 35px;
          background: none;
          border: none;
          cursor: pointer;
        }
  
        .login-container {
            flex: 1;
            padding: 48px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
            color: #1b5e20;
        }
 
        .logo span {
            font-size: 30px;
        }

        .logo h1 {
            font-size: 24px;
            font-weight: 700;
        }

        .login-container p {
            color: #4f6f5a;
            margin-bottom: 32px;
            font-size: 14px;
        } 

        .input-group {
            margin-bottom: 18px;
        }

        .input-group label {
            display: block;
            margin-bottom: 6px;
            font-size: 14px;
            color: #2e7d32;
        }

        .input-group input {
            width: 100%;
            padding: 14px;
            border-radius: 10px;
            border: 1px solid #b7d7c0;
            font-size: 14px;
            outline: none;
        }

        .input-group input:focus {
            border-color: #43a047;
            box-shadow: 0 0 0 3px rgba(67, 160, 71, 0.2);
        }

        .login-btn {
            margin-top: 10px;
            width: 100%;
            padding: 14px;
            background: #1b5e20;
            color: #fff;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, background 0.3s;
        }

        .login-btn:hover {
      background: #0f3d2e;
      transform: translateY(-2px);
    }

    .footer-text {
      text-align: center;
      margin-top: 24px;
      font-size: 13px;
      color: #5f7f68;
    }

    .footer-text a {
      color: #1b5e20;
      font-weight: 600;
      text-decoration: none;
    }

    /* RESPONSIVO */
    @media (max-width: 768px) {
      .login-wrapper {
        flex-direction: column;
      }

      .login-image {
        height: 220px;
      }
    }
  </style>
</head>
<body>

  <div class="login-wrapper">
    
    <div class="login-image">
      <div class="image-text">
        <h2>Olhar Verde</h2>
        <p>Transformando consciência ambiental em ação sustentável todos os dias.</p>
      </div> 
    </div>
    <div class="btn-main">
      <a href="/index.html">
          <img src="/images/seta.png" alt="Voltar para a página inicial">
          </a>
          </div>

    <div class="login-container">
      <div class="logo">
        <img src="/images/logo.png" width="35" height="35">
        <h1>Olhar Verde</h1>
      </div>

      <p>Acesse sua conta e acompanhe iniciativas que fazem a diferença no planeta.</p>

      <form>
        <div class="input-group">
          <label for="email">E-mail</label>
          <input type="email" id="email" placeholder="seu@email.com">
        </div>

        <div class="input-group">
          <label for="senha">Senha</label>
          <input type="password" id="senha" placeholder="••••••••">
        </div>

        <button class="login-btn" type="submit">Entrar</button>
      </form>

      <div class="footer-text">
        <p>♻️ Pequenas ações constroem grandes mudanças</p>
        <a href="#">Criar conta</a>
      </div>
    </div>

  </div>

    </style>
</head>
<body>

</body>
</html>
